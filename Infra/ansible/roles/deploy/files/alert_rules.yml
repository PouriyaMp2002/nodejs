groups:
  - name: app-and-host-alerts
    rules:
      - alert: AppDown
        expr: up{job="node-app"} == 0
        for: 1m
        labels: 
          severity: critical
        annotations: 
          summary: "Node app is down"
          description: "Prometheus cannot scrape the NodeJS app metrics endpoint"
      
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m]))*100) > 85
        for: 2m
        
        labels:
          severity: warning
        annotations: "High CPU Usage"
        description: "CPU Usage is above 85% for more than 2 minutes."
        